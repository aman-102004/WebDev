<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List In HTML</title>
</head>
<body>
    <ul>
        <li>Bread</li>
        <li>Jam</li>
        <li>Biscuit</li>
    </ul>
    <ol type="A">
        
        <li>Bread</li>
        <ul>
            <li>Rs10</li>
            <li>Rs20</li>
        </ul>
        <li>Jam</li>
        <li>Biscuit</li>
        
    </ol>
</body>
</html>
